services:
  - type: web
    name: invoxl-backend
    env: node
    plan: free
    region: ohio
    # Backend is in the backend/ directory
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.16.0
      - key: MONGO_URI
        sync: false
        placeholder: "your_mongodb_atlas_uri"
      - key: JWT_SECRET
        sync: false
        placeholder: "your_secure_random_string"
      - key: OPENAI_API_KEY
        sync: false
        placeholder: "your_openai_api_key_optional"
      - key: PORT
        value: 10000
